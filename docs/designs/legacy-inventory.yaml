version: 1
policy:
  purpose: >
    Long-term ledger and CI gate for production legacy references. New
    production legacy references are blocked unless an entry is added here with
    an owner, reason, deletion condition, and verification path.
  scan_roots:
    - forwin
    - scripts
    - frontend
  excluded_roots:
    - tests
    - docs
    - forwin/**/__pycache__
    - scripts/**/__pycache__
    - frontend/node_modules
    - frontend/node_modules/**
    - frontend/dist
    - frontend/dist/**
    - frontend/build
    - frontend/build/**
    - frontend/.next
    - frontend/.next/**
    - frontend/**/node_modules
    - frontend/**/node_modules/**
    - frontend/**/dist
    - frontend/**/dist/**
    - frontend/**/build
    - frontend/**/build/**
    - frontend/**/.next
    - frontend/**/.next/**
  token_patterns:
    - legacy
    - Legacy
    - LEGACY
  included_extensions:
    - .py
    - .js
    - .html
    - .ts
    - .tsx
  final_allowed_categories:
    - migration_history_keep
    - test_doc_followup
    - deleted

categories:
  runtime_delete: Runtime old-project or old-canon compatibility that must be removed.
  rename_only: Current production behavior whose legacy naming must be renamed.
  external_compat_delete: Compatibility for old clients, env names, storage, or public call shapes.
  migration_history_keep: Historical migration/revision content retained outside runtime.
  test_doc_followup: Test or current documentation references that follow production cleanup.
  deleted: Historical record for removed entries; production paths must no longer match.

