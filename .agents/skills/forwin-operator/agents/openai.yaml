interface:
  display_name: "ForWin Operator"
  short_description: "Operate ForWin safely through MCP workflows."
  default_prompt: "Use $forwin-operator to operate the running ForWin backend through its MCP tools instead of inspecting raw DB state."

dependencies:
  tools:
    - type: "mcp"
      value: "forwin"
      description: "ForWin MCP server"
      transport: "streamable_http"
      url: "http://127.0.0.1:8896/mcp"

policy:
  allow_implicit_invocation: true
