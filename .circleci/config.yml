# This config was automatically generated from your source code
# Stacks detected: deps:node:browser_extension/forwin-publisher,deps:python:.
version: 2.1
orbs:
  node: circleci/node@5
  python: circleci/python@2
jobs:
  test-node:
    # Install node dependencies and run tests
    executor: node/default
    working_directory: ~/project/browser_extension/forwin-publisher
    steps:
      - checkout:
          path: ~/project
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: npm install
      - run:
          name: Run tests
          command: npm test --passWithNoTests
  test-python:
    # Install dependencies and run tests
    docker:
      - image: cimg/python:3.12-node
      - image: postgres:16-alpine
        environment:
          POSTGRES_USER: forwin
          POSTGRES_PASSWORD: forwin
          POSTGRES_DB: forwin_test
      - image: qdrant/qdrant:v1.17.1
        environment:
          QDRANT__SERVICE__HTTP_PORT: "6335"
    environment:
      FORWIN_DATABASE_URL: postgresql+psycopg://forwin:forwin@127.0.0.1:5432/forwin_test
      FORWIN_TEST_DATABASE_URL: postgresql+psycopg://forwin:forwin@127.0.0.1:5432/forwin_test
      FORWIN_QDRANT_URL: http://127.0.0.1:6335
      FORWIN_CODEX_ENABLED: "false"
      MINIMAX_API_KEY: ci-test-key
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - checkout
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -e ".[test]"
      - run:
          name: Build World Studio frontend
          command: |
            npm --prefix frontend/world-studio ci
            npm --prefix frontend/world-studio run build
      - run:
          name: Install Playwright Chromium
          command: python -m playwright install --with-deps chromium
      - run:
          name: Wait for service dependencies
          command: |
            python - <<'PY'
            import socket
            import time

            import psycopg

            checks = [
                ("postgres", "127.0.0.1", 5432),
                ("qdrant", "127.0.0.1", 6335),
            ]
            deadline = time.monotonic() + 60
            while True:
                pending = []
                for name, host, port in checks:
                    try:
                        with socket.create_connection((host, port), timeout=1):
                            pass
                    except OSError as exc:
                        pending.append(f"{name}: {exc}")
                if not pending:
                    try:
                        with psycopg.connect(
                            "postgresql://forwin:forwin@127.0.0.1:5432/forwin_test",
                            connect_timeout=2,
                        ):
                            pass
                        break
                    except psycopg.Error as exc:
                        pending.append(f"postgres auth: {exc}")
                if time.monotonic() > deadline:
                    raise SystemExit("Timed out waiting for services: " + "; ".join(pending))
                time.sleep(1)
            PY
      - run:
          name: Run Python tests
          command: |
            mkdir -p test-results/pytest
            pytest --junitxml=test-results/pytest/junit.xml || ((($? == 5)) && echo 'Did not find any tests to run.')
      - store_test_results:
          path: test-results
  deploy:
    # This is an example deploy job, not actually used by the workflow
    docker:
      - image: cimg/base:stable
    steps:
      # Replace this with steps to deploy to users
      - run:
          name: deploy
          command: '#e.g. ./deploy.sh'
workflows:
  build-and-test:
    jobs:
      - test-node
      - test-python
    # - deploy:
    #     requires:
    #       - test-node
    #       - test-python
