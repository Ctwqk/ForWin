services:
  forwin:
    build: .
    container_name: forwin
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - ${FORWIN_ENV_FILE:-/home/taiwei/ForWin/.env}
    ports:
      - "8899:8899"
    volumes:
      - forwin-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-k2.5}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - LLM_RETRY_ATTEMPTS=${LLM_RETRY_ATTEMPTS:-2}
      - LLM_RETRY_INITIAL_DELAY_SECONDS=${LLM_RETRY_INITIAL_DELAY_SECONDS:-2}
      - LLM_RETRY_MAX_DELAY_SECONDS=${LLM_RETRY_MAX_DELAY_SECONDS:-15}
      - FORWIN_DATABASE_URL=${FORWIN_DATABASE_URL:-postgresql+psycopg://forwin:forwin@postgres:5432/forwin}
      - WRITER_MODE=${WRITER_MODE:-scene}
      - FORWIN_RETRIEVAL_BACKEND=${FORWIN_RETRIEVAL_BACKEND:-qdrant}
      - FORWIN_QDRANT_URL=${FORWIN_QDRANT_URL:-http://qdrant:6333}
      - FORWIN_QDRANT_COLLECTION=${FORWIN_QDRANT_COLLECTION:-chapter_memories}
      - FORWIN_ARTIFACT_BACKEND=${FORWIN_ARTIFACT_BACKEND:-minio}
      - FORWIN_MINIO_ENDPOINT=${FORWIN_MINIO_ENDPOINT:-minio:9000}
      - FORWIN_MINIO_ACCESS_KEY=${FORWIN_MINIO_ACCESS_KEY:-forwinminio}
      - FORWIN_MINIO_SECRET_KEY=${FORWIN_MINIO_SECRET_KEY:-forwinminio123}
      - FORWIN_MINIO_BUCKET=${FORWIN_MINIO_BUCKET:-forwin-artifacts}
      - FORWIN_MINIO_PREFIX=${FORWIN_MINIO_PREFIX:-artifacts}
      - FORWIN_MINIO_SECURE=${FORWIN_MINIO_SECURE:-false}
      - FORWIN_CODEX_ENABLED=${FORWIN_CODEX_ENABLED:-false}
      - FORWIN_CODEX_BRIDGE_URL=${FORWIN_CODEX_BRIDGE_URL:-http://host.docker.internal:8897}
      - FORWIN_CODEX_BRIDGE_TOKEN=${FORWIN_CODEX_BRIDGE_TOKEN:-}
      - FORWIN_CODEX_MAX_CONCURRENT=${FORWIN_CODEX_MAX_CONCURRENT:-1}
      - FORWIN_CODEX_SYNC_TIMEOUT_SECONDS=${FORWIN_CODEX_SYNC_TIMEOUT_SECONDS:-90}
      - FORWIN_CODEX_JOB_TIMEOUT_SECONDS=${FORWIN_CODEX_JOB_TIMEOUT_SECONDS:-900}
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: forwin-postgres
    environment:
      - POSTGRES_USER=${FORWIN_POSTGRES_USER:-forwin}
      - POSTGRES_PASSWORD=${FORWIN_POSTGRES_PASSWORD:-forwin}
      - POSTGRES_DB=${FORWIN_POSTGRES_DB:-forwin}
    volumes:
      - forwin-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORWIN_POSTGRES_USER:-forwin} -d ${FORWIN_POSTGRES_DB:-forwin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  forwin-mcp:
    build: .
    container_name: forwin-mcp
    depends_on:
      forwin:
        condition: service_healthy
    command: ["python", "-m", "uvicorn", "forwin.mcp.http:app", "--host", "0.0.0.0", "--port", "8898"]
    env_file:
      - ${FORWIN_ENV_FILE:-/home/taiwei/ForWin/.env}
    environment:
      - FORWIN_API_BASE_URL=${FORWIN_API_BASE_URL:-http://forwin:8899}
      - FORWIN_MCP_HOST=${FORWIN_MCP_HOST:-0.0.0.0}
      - FORWIN_MCP_PORT=${FORWIN_MCP_PORT:-8898}
    ports:
      - "127.0.0.1:8898:8898"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import httpx; r = httpx.get('http://localhost:8898/health'); raise SystemExit(0 if r.status_code == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  publisher-browser:
    build: .
    container_name: forwin-publisher-browser
    depends_on:
      forwin:
        condition: service_healthy
    command: ["bash", "-lc", "exec scripts/launch_linux_extension_browser.sh"]
    env_file:
      - ${FORWIN_ENV_FILE:-/home/taiwei/ForWin/.env}
    environment:
      - FORWIN_BACKEND_URL=${FORWIN_PUBLISHER_BROWSER_BACKEND_URL:-http://forwin:8899}
      - FORWIN_DATABASE_URL=${FORWIN_DATABASE_URL:-postgresql+psycopg://forwin:forwin@postgres:5432/forwin}
      - FORWIN_PUBLISHER_EXTENSION_API_KEY=${FORWIN_PUBLISHER_EXTENSION_API_KEY:-}
      - FORWIN_PUBLISHER_PREFERRED_CLIENT_ID=${FORWIN_PUBLISHER_PREFERRED_CLIENT_ID:-}
      - FORWIN_EXTENSION_TEST_PROFILE=${FORWIN_EXTENSION_TEST_PROFILE:-/app/data/chrome_profiles/forwin-extension}
      - FORWIN_EXTENSION_REQUIRE_QUALIFIED_PROFILE=${FORWIN_EXTENSION_REQUIRE_QUALIFIED_PROFILE:-true}
      - FORWIN_EXTENSION_AUTO_QUALIFY_PROFILE=${FORWIN_EXTENSION_AUTO_QUALIFY_PROFILE:-true}
      - FORWIN_EXTENSION_DISPLAY=${FORWIN_EXTENSION_DISPLAY:-:100}
      - FORWIN_EXTENSION_XVFB_SERVER_NUM=${FORWIN_EXTENSION_XVFB_SERVER_NUM:-100}
      - FORWIN_EXTENSION_NO_SANDBOX=${FORWIN_EXTENSION_NO_SANDBOX:-auto}
      - FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_PORT=${FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_PORT:-9222}
      - FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_ADDRESS=${FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_ADDRESS:-0.0.0.0}
      - FORWIN_EXTENSION_STARTUP_HEARTBEAT_TIMEOUT_SECONDS=${FORWIN_EXTENSION_STARTUP_HEARTBEAT_TIMEOUT_SECONDS:-75}
      - FORWIN_PUBLISHER_HEARTBEAT_STALE_SECONDS=${FORWIN_PUBLISHER_HEARTBEAT_STALE_SECONDS:-90}
    volumes:
      - forwin-data:/app/data
    ports:
      - "${FORWIN_EXTENSION_DEBUG_BIND:-127.0.0.1:9222}:9222"
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python scripts/qualify_linux_extension_profile.py --check --check-active && python scripts/check_publisher_browser_heartbeat.py --wait-seconds 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: forwin-qdrant
    volumes:
      - forwin-qdrant:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: forwin-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${FORWIN_MINIO_ACCESS_KEY:-forwinminio}
      - MINIO_ROOT_PASSWORD=${FORWIN_MINIO_SECRET_KEY:-forwinminio123}
    volumes:
      - forwin-minio:/data
    restart: unless-stopped

volumes:
  forwin-data:
  forwin-postgres:
  forwin-qdrant:
  forwin-minio:
