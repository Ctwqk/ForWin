services:
  forwin:
    build: .
    container_name: forwin
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - path: ${FORWIN_ENV_FILE:-.env}
        required: false
    environment:
      - FORWIN_DATABASE_URL=${FORWIN_DATABASE_URL:-postgresql+psycopg://forwin:forwin@postgres:5432/forwin}
      - FORWIN_HTTP_BIND=${FORWIN_HTTP_BIND:-127.0.0.1}
      - FORWIN_ALLOW_BIND_ALL_INTERFACES=${FORWIN_ALLOW_BIND_ALL_INTERFACES:-false}
      - FORWIN_ALLOW_UNAUTHENTICATED_LAN=${FORWIN_ALLOW_UNAUTHENTICATED_LAN:-false}
    ports:
      - "${FORWIN_HTTP_BIND:-127.0.0.1}:${FORWIN_HTTP_PORT:-8899}:8899"
    volumes:
      - forwin-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: forwin-postgres
    environment:
      - POSTGRES_USER=${FORWIN_POSTGRES_USER:-forwin}
      - POSTGRES_PASSWORD=${FORWIN_POSTGRES_PASSWORD:-forwin}
      - POSTGRES_DB=${FORWIN_POSTGRES_DB:-forwin}
    volumes:
      - forwin-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: forwin-postgres-test
    environment:
      - POSTGRES_USER=${FORWIN_TEST_POSTGRES_USER:-forwin}
      - POSTGRES_PASSWORD=${FORWIN_TEST_POSTGRES_PASSWORD:-forwin}
      - POSTGRES_DB=${FORWIN_TEST_POSTGRES_DB:-forwin_test}
    ports:
      - "${FORWIN_TEST_POSTGRES_BIND:-127.0.0.1:55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-v1.17.1}
    container_name: forwin-qdrant
    ports:
      - "${FORWIN_QDRANT_DEBUG_BIND:-127.0.0.1:6335}:6333"
    volumes:
      - forwin-qdrant:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec '</dev/tcp/127.0.0.1/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  forwin-mcp:
    build: .
    container_name: forwin-mcp
    depends_on:
      forwin:
        condition: service_healthy
    command: ["python", "-m", "uvicorn", "forwin.mcp.http:app", "--host", "0.0.0.0", "--port", "8896"]
    env_file:
      - path: ${FORWIN_ENV_FILE:-.env}
        required: false
    environment:
      - FORWIN_API_BASE_URL=${FORWIN_API_BASE_URL:-http://forwin:8899}
      - FORWIN_MCP_API_TIMEOUT_SECONDS=${FORWIN_MCP_API_TIMEOUT_SECONDS:-300}
      - FORWIN_MCP_HOST=${FORWIN_MCP_HOST:-0.0.0.0}
      - FORWIN_MCP_PORT=${FORWIN_MCP_PORT:-8896}
    ports:
      - "${FORWIN_MCP_DEBUG_BIND:-127.0.0.1:8896}:8896"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import httpx; r = httpx.get('http://localhost:8896/health'); raise SystemExit(0 if r.status_code == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  publisher-browser:
    build: .
    container_name: forwin-publisher-browser
    profiles:
      - "publisher"
    depends_on:
      forwin:
        condition: service_healthy
    command: ["bash", "-lc", "exec scripts/launch_linux_extension_browser.sh"]
    env_file:
      - path: ${FORWIN_ENV_FILE:-.env}
        required: false
    environment:
      - FORWIN_BACKEND_URL=${FORWIN_PUBLISHER_BROWSER_BACKEND_URL:-http://forwin:8899}
      - FORWIN_DATABASE_URL=${FORWIN_DATABASE_URL:-postgresql+psycopg://forwin:forwin@postgres:5432/forwin}
      - FORWIN_EXTENSION_TEST_PROFILE=${FORWIN_EXTENSION_TEST_PROFILE:-/app/data/chrome_profiles/forwin-extension}
      - FORWIN_EXTENSION_REQUIRE_QUALIFIED_PROFILE=${FORWIN_EXTENSION_REQUIRE_QUALIFIED_PROFILE:-true}
      - FORWIN_EXTENSION_AUTO_QUALIFY_PROFILE=${FORWIN_EXTENSION_AUTO_QUALIFY_PROFILE:-true}
      - FORWIN_EXTENSION_DISPLAY=${FORWIN_EXTENSION_DISPLAY:-:100}
      - FORWIN_EXTENSION_XVFB_SERVER_NUM=${FORWIN_EXTENSION_XVFB_SERVER_NUM:-100}
      - FORWIN_EXTENSION_NO_SANDBOX=${FORWIN_EXTENSION_NO_SANDBOX:-auto}
      - FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_PORT=${FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_PORT:-9222}
      - FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_ADDRESS=${FORWIN_EXTENSION_TEST_REMOTE_DEBUGGING_ADDRESS:-0.0.0.0}
      - FORWIN_EXTENSION_STARTUP_HEARTBEAT_TIMEOUT_SECONDS=${FORWIN_EXTENSION_STARTUP_HEARTBEAT_TIMEOUT_SECONDS:-75}
      - FORWIN_PUBLISHER_HEARTBEAT_STALE_SECONDS=${FORWIN_PUBLISHER_HEARTBEAT_STALE_SECONDS:-90}
    volumes:
      - forwin-data:/app/data
    ports:
      - "${FORWIN_EXTENSION_DEBUG_BIND:-127.0.0.1:9222}:9222"
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python scripts/qualify_linux_extension_profile.py --check --check-active && python scripts/check_publisher_browser_heartbeat.py --wait-seconds 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z}
    container_name: forwin-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${FORWIN_MINIO_ACCESS_KEY:?set FORWIN_MINIO_ACCESS_KEY in .env}
      - MINIO_ROOT_PASSWORD=${FORWIN_MINIO_SECRET_KEY:?set FORWIN_MINIO_SECRET_KEY in .env}
    volumes:
      - forwin-minio:/data
    restart: unless-stopped

volumes:
  forwin-data:
  forwin-postgres:
  forwin-qdrant:
  forwin-minio:
